services:
  api:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - shared-db

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.main"]
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - shared-db

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_PROXY_API_TARGET: ${VITE_PROXY_API_TARGET:-http://api:8000}
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

networks:
  shared-db:
    name: shared-db
    external: true
